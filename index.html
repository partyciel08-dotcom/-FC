<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상통화</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: sans-serif;
}

/* 📞 전화 수신 화면 */
.start-screen {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 999;
}

.accept-btn {
  margin-top: 20px;
  padding: 15px 30px;
  font-size: 18px;
  background: green;
  border: none;
  border-radius: 50px;
  color: white;
}

/* 🎥 통화 화면 */
.call-ui {
  position: relative;
  height: 100vh;
  display: none;
}

video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 상단 */
.top {
  position: absolute;
  top: 30px;
  width: 100%;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
}

/* 타이머 */
.timer {
  position: absolute;
  top: 60px;
  width: 100%;
  text-align: center;
  font-size: 14px;
}

/* 하단 종료 버튼 */
.bottom {
  position: absolute;
  bottom: 50px;
  width: 100%;
  display: flex;
  justify-content: center;
}

.end-btn {
  width: 70px;
  height: 70px;
  background: red;
  border-radius: 50%;
  border: none;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- 📞 수신 화면 -->
<div class="start-screen" id="startScreen">
  <h2>📞 영상통화가 걸려왔습니다</h2>
  <button class="accept-btn" onclick="startCall()">받기</button>
</div>

<!-- 🎥 통화 화면 -->
<div class="call-ui" id="callUI">
  <div class="top" id="name">연결중...</div>
  <div class="timer" id="timer">00:00</div>
  <video id="video" playsinline></video>

  <div class="bottom">
    <button class="end-btn" onclick="endCall()">종료</button>
  </div>
</div>

<script>
// 👉 네이버 폼 링크
const formLink = "https://naver.me/G8fZCBl4";

// 👉 영상 리스트 (여기 수정)
const videos = [
  { src: "영상주소1.mp4", name: "조빈" },
  { src: "영상주소2.mp4", name: "선수2" }
];

// 랜덤 선택
const random = videos[Math.floor(Math.random() * videos.length)];

const video = document.getElementById("video");
const nameEl = document.getElementById("name");

video.src = random.src;

// ⏱️ 타이머
let sec = 0;
let timerStarted = false;

function startTimer(){
  if(timerStarted) return;
  timerStarted = true;

  setInterval(() => {
    sec++;
    let m = String(Math.floor(sec / 60)).padStart(2, '0');
    let s = String(sec % 60).padStart(2, '0');
    document.getElementById("timer").innerText = `${m}:${s}`;
  }, 1000);
}

// 📞 통화 시작
function startCall(){
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("callUI").style.display = "block";

  video.muted = false;
  video.play();

  nameEl.innerText = random.name + " (영상통화 중)";

  startTimer();

  // 👉 30초 후 자동 종료
  setTimeout(() => {
    goForm();
  }, 30000);
}

// ❌ 종료 버튼
function endCall(){
  goForm();
}

// 👉 폼 이동
function goForm(){
  window.location.href = formLink;
}
</script>

</body>
</html>
